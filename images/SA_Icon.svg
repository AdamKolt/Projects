<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 290" width="290" height="290">
  <!-- Sales Academy icon — graduation cap + tassel + diploma scroll -->

  <!-- Graduation cap band (gold, sits under mortarboard) -->
  <path d="M 90 128 Q 145 142 200 128 L 200 162 Q 145 178 90 162 Z" fill="#C9A84C"/>

  <!-- Mortarboard (navy diamond — the flat square top) -->
  <polygon points="145,52 242,110 145,150 48,110" fill="#1A2B4A"/>

  <!-- Cap button -->
  <circle cx="145" cy="73" r="6" fill="#C9A84C"/>

  <!-- Tassel cord (curving from button to right side of cap) -->
  <path d="M 145 73 Q 180 92 200 132 L 200 178" fill="none" stroke="#C9A84C" stroke-width="5" stroke-linecap="round"/>

  <!-- Tassel fringe -->
  <line x1="194" y1="178" x2="190" y2="198" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="178" x2="200" y2="200" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
  <line x1="206" y1="178" x2="210" y2="198" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>

  <!-- Diploma scroll body (gold rectangle) -->
  <rect x="55" y="220" width="180" height="32" rx="2" fill="#C9A84C"/>

  <!-- Diploma rolled end — left -->
  <ellipse cx="55" cy="236" rx="8" ry="16" fill="#C9A84C"/>
  <ellipse cx="55" cy="236" rx="3" ry="10" fill="#1A2B4A"/>

  <!-- Diploma rolled end — right -->
  <ellipse cx="235" cy="236" rx="8" ry="16" fill="#C9A84C"/>
  <ellipse cx="235" cy="236" rx="3" ry="10" fill="#1A2B4A"/>

  <!-- Diploma navy ribbon/seal -->
  <rect x="135" y="215" width="20" height="42" fill="#1A2B4A"/>
</svg>
